---
# Default variables for nginx_role (safe, overrideable)
nginx_package: nginx
nginx_service: nginx
nginx_user: www-data
nginx_group: www-data
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_http_port: 80
nginx_server_name: "_"
nginx_doc_root: "/var/www/html"
nginx_conf_path: "/etc/nginx/nginx.conf"
nginx_index_content: "<h1>It works!</h1>\n"
nginx_keepalive_timeout: 65
nginx_sendfile: "on"
nginx_gzip: true
