---
# Install package
- name: Ensure the nginx package is installed
  package:
    name: "{{ nginx_package }}"
    state: present

# Ensure document root exists with correct permissions
- name: Ensure document root exists
  file:
    path: "{{ nginx_doc_root }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0755'

# Deploy a simple index page (template)
- name: Deploy index.html
  template:
    src: index.html.j2
    dest: "{{ nginx_doc_root }}/index.html"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0644'

# Deploy main nginx configuration (idempotent)
- name: Deploy nginx main config
  template:
    src: nginx.conf.j2
    dest: "{{ nginx_conf_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

# Ensure service enabled & started
- name: Ensure nginx service is enabled and started
  service:
    name: "{{ nginx_service }}"
    state: started
    enabled: yes
---
# tasks file for nginx_role
